<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electron 图形化打包器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-glow"></div>
    <main class="layout">
      <aside class="sidebar panel">
        <div class="brand">
          <h1>html2exe</h1>
          <p>Electron 打包器</p>
        </div>
        <nav class="nav-menu">
          <button class="nav-item active" data-tab="basic"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg> 基础配置</button>
          <button class="nav-item" data-tab="build"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="m7.5 4.27 9 5.15"></path><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path><path d="m3.3 7 8.7 5 8.7-5"></path><path d="M12 22V12"></path></svg> 构建策略</button>
          <button class="nav-item" data-tab="platform"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><rect width="20" height="14" x="2" y="3" rx="2"></rect><line x1="8" x2="16" y1="21" y2="21"></line><line x1="12" x2="12" y1="17" y2="21"></line></svg> 平台参数</button>
          <button class="nav-item" data-tab="installer"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path></svg> 安装包设置</button>
          <button class="nav-item" data-tab="window"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><line x1="3" x2="21" y1="9" y2="9"></line><line x1="9" x2="9" y1="21" y2="9"></line></svg> 窗口与图标</button>
          <button class="nav-item" data-tab="resources"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"></path></svg> 文件与资源</button>
        </nav>
        <div class="sidebar-actions">
          <button id="goOutputPageBtn" type="button" class="primary"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M4 12h16"></path><path d="m14 6 6 6-6 6"></path></svg> 前往输出页面</button>
          <button id="loadProjectDefaultsBtn" type="button" class="secondary"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"></path></svg> 读取项目信息</button>
          <button id="saveConfigBtn" type="button" class="secondary"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"></path><path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7"></path><path d="M7 3v4a1 1 0 0 0 1 1h7"></path></svg> 保存当前配置</button>
          <button id="clearCacheBtn" type="button" class="warning"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg> 清理构建缓存</button>
        </div>
      </aside>

      <div class="content-area single-panel">
        <section class="panel form-panel">
          <div id="tab-basic" class="tab-content active">
            <div class="section-title">基础路径</div>
            <div class="field-row">
              <label for="projectDir">Electron 项目目录</label>
              <div class="input-with-btn">
                <input id="projectDir" type="text" placeholder="请选择包含可执行逻辑的目录" />
                <button id="pickProjectBtn" type="button">浏览</button>
              </div>
            </div>
            <div class="field-row">
              <label for="outputDir">打包输出目录</label>
              <div class="input-with-btn">
                <input id="outputDir" type="text" placeholder="默认为 release 文件夹" />
                <button id="pickOutputBtn" type="button">浏览</button>
              </div>
            </div>
            <div class="section-title">应用信息</div>
            <div class="grid two-col">
              <div class="field-row"><label for="appId">应用程序 ID (App ID)</label><input id="appId" type="text" placeholder="如 com.example.desktop" /></div>
              <div class="field-row"><label for="productName">产品名称 (Product Name)</label><input id="productName" type="text" placeholder="例如：我的应用" /></div>
              <div class="field-row"><label for="executableName">主执行文件名 (Executable)</label><input id="executableName" type="text" placeholder="例如：my-app" /></div>
              <div class="field-row"><label for="artifactName">产物命名模板</label><input id="artifactName" type="text" placeholder="${productName}-${version}-${os}-${arch}.${ext}" /></div>
              <div class="field-row"><label for="version">应用版本号</label><input id="version" type="text" placeholder="例如：1.0.0" /></div>
              <div class="field-row"><label for="author">开发者或组织名称</label><input id="author" type="text" placeholder="你的团队名" /></div>
            </div>
            <div class="field-row">
              <label for="description">应用简介 (Description)</label>
              <input id="description" type="text" placeholder="一句话介绍这个应用的功能" />
            </div>
          </div>

          <div id="tab-build" class="tab-content">
            <div class="section-title">构建策略</div>
            <div class="preset-card">
              <div class="preset-head">
                <div class="field-row">
                  <label for="buildPreset">构建参数预设</label>
                  <select id="buildPreset">
                    <option value="release" selected>发布推荐 (默认)</option>
                    <option value="quick">快速验证 (构建更快)</option>
                    <option value="compact">体积优先 (包体更小)</option>
                    <option value="cross">跨平台分发 (多平台)</option>
                  </select>
                </div>
                <button id="applyPresetBtn" type="button" class="secondary">应用预设</button>
              </div>
              <p id="presetHint" class="preset-hint">当前预设: 发布推荐。平衡构建速度、兼容性与产物质量。</p>
            </div>
            <div class="grid three-col">
              <div class="field-row">
                <label for="compression">代码压缩级别</label>
                <select id="compression">
                  <option value="store">store (无压缩，打包最快)</option>
                  <option value="normal" selected>normal (标准压缩)</option>
                  <option value="maximum">maximum (最大压缩，体积最小)</option>
                </select>
              </div>
              <div class="field-row">
                <label for="arches">目标架构类型</label>
                <select id="arches">
                  <option value="x64" selected>x64 (主流 64 位系统)</option>
                  <option value="arm64">arm64 (ARM 硬件如 Apple 芯片)</option>
                  <option value="x64, arm64">双架构混合 (x64 与 arm64)</option>
                  <option value="ia32">ia32 (传统 32 位系统)</option>
                  <option value="universal">universal (macOS 双架构通用)</option>
                </select>
              </div>
              <div class="field-row checkbox-row">
                <label for="asar">启用 Asar 文件保护</label>
                <input id="asar" type="checkbox" checked />
              </div>
              <div class="field-row checkbox-row">
                <label for="npmRebuild">重新编译构建模块 (npmRebuild)</label>
                <input id="npmRebuild" type="checkbox" checked />
              </div>
            </div>
            <div class="section-title">运行时高级控制</div>
            <div class="grid three-col">
              <div class="field-row">
                <label for="electronVersion">Electron 版本</label>
                <input id="electronVersion" type="text" list="electronVersionOptions" placeholder="选择或输入，如 41.2.0；留空使用本地默认" />
                <datalist id="electronVersionOptions">
                  <option value="41.2.0"></option>
                  <option value="40.3.0"></option>
                  <option value="39.4.0"></option>
                  <option value="38.6.0"></option>
                  <option value="37.5.0"></option>
                  <option value="36.4.0"></option>
                </datalist>
              </div>
              <div class="field-row">
                <label for="chromiumVersion">Chromium 版本覆盖 (高级)</label>
                <input id="chromiumVersion" type="text" list="chromiumVersionOptions" placeholder="选择或输入，如 134.0.6998，可留空" />
                <datalist id="chromiumVersionOptions">
                  <option value="138.0.7204"></option>
                  <option value="136.0.7103"></option>
                  <option value="134.0.6998"></option>
                  <option value="132.0.6834"></option>
                  <option value="130.0.6723"></option>
                  <option value="128.0.6613"></option>
                </datalist>
              </div>
              <div class="field-row">
                <label for="nodeVersion">Node.js 版本覆盖 (高级)</label>
                <input id="nodeVersion" type="text" list="nodeVersionOptions" placeholder="选择或输入，如 22.13.1，可留空" />
                <datalist id="nodeVersionOptions">
                  <option value="24.2.0"></option>
                  <option value="22.13.1"></option>
                  <option value="22.12.0"></option>
                  <option value="20.18.1"></option>
                  <option value="20.16.0"></option>
                  <option value="18.20.4"></option>
                </datalist>
              </div>
            </div>
            <div class="field-row">
              <label>说明</label>
              <input type="text" value="Chromium/Node.js 覆盖会以环境变量注入构建流程，适用于原生依赖编译与自定义脚本控制。" readonly />
            </div>
            <div class="field-row checkbox-row">
              <label for="clearRuntimeOverridesAfterBuild">打包结束后自动清空高级版本字段（Electron/Chromium/Node.js）</label>
              <input id="clearRuntimeOverridesAfterBuild" type="checkbox" />
            </div>
            <div class="field-row checkbox-row inline-checks">
              <label>目标操作系统</label>
              <div class="checks">
                <label><input id="targetWindows" type="checkbox" checked /> 🪟 Windows</label>
                <label><input id="targetLinux" type="checkbox" /> 🐧 Linux</label>
                <label><input id="targetMac" type="checkbox" /> 🍎 macOS</label>
              </div>
            </div>
            <div class="quick-platform-actions">
              <button id="chooseHostPlatformBtn" type="button" class="secondary">仅当前系统平台</button>
              <button id="chooseAllPlatformsBtn" type="button" class="secondary">切换为全平台</button>
            </div>
          </div>

          
          <div id="tab-platform" class="tab-content">
            <div class="section-title">按操作系统区分的平台配置</div>
            <div class="platform-cards">
              
              <!-- Windows -->
              <div class="os-card">
                <div class="os-header">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect><line x1="3" x2="21" y1="9" y2="9"></line><line x1="9" x2="9" y1="21" y2="9"></line></svg>
                  <h3>Windows 平台</h3>
                </div>
                <div class="os-body grid two-col">
                  <div class="config-col">
                    <h4 class="col-title">设置参数区</h4>
                    <div class="field-row">
                      <label for="publisherName">签名发行者 (Publisher)</label>
                      <input id="publisherName" type="text" placeholder="留空则使用默认名称" />
                    </div>
                  </div>
                  <div class="output-col">
                    <h4 class="col-title">产物输出区</h4>
                    <div class="field-row">
                      <label for="winTargets">最终产物形式</label>
                      <select id="winTargets">
                        <option value="" disabled>-- 请选择 Windows 产物 --</option>
                        <option value="nsis" selected>nsis - 标准安装程序 (默认)</option>
                        <option value="portable">portable - 绿色单文件版</option>
                        <option value="nsis, portable">nsis + portable (同时产出)</option>
                        <option value="zip">zip - 免安装纯压缩包</option>
                        <option value="nsis, zip">nsis + zip (同时产出)</option>
                      </select>
                    </div>
                    <div class="field-row checkbox-row">
                      <label for="winPortable">强制额外输出纯绿便携版</label>
                      <input id="winPortable" type="checkbox" />
                    </div>
                  </div>
                </div>
              </div>

              <!-- Linux -->
              <div class="os-card">
                <div class="os-header">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" x2="20" y1="19" y2="19"></line></svg>
                  <h3>Linux 平台</h3>
                </div>
                <div class="os-body grid two-col">
                  <div class="config-col">
                    <h4 class="col-title">设置参数区</h4>
                    <div class="field-row">
                      <label for="linuxCategory">应用程序分类</label>
                      <select id="linuxCategory">
                        <option value="" disabled>-- 请选择 Linux 分类 --</option>
                        <option value="Utility" selected>Utility - 实用工具 (默认)</option>
                        <option value="Development">Development - 开发工具</option>
                        <option value="Education">Education - 教育应用</option>
                        <option value="Game">Game - 电子游戏</option>
                        <option value="Graphics">Graphics - 图像设计</option>
                        <option value="Network">Network - 网络通信</option>
                        <option value="Office">Office - 办公软件</option>
                        <option value="System">System - 系统管理</option>
                      </select>
                    </div>
                  </div>
                  <div class="output-col">
                    <h4 class="col-title">产物输出区</h4>
                    <div class="field-row">
                      <label for="linuxTargets">最终产物形式</label>
                      <select id="linuxTargets">
                        <option value="" disabled>-- 请选择 Linux 产物 --</option>
                        <option value="AppImage" selected>AppImage - 通用运行版 (默认推荐)</option>
                        <option value="deb">deb - Debian/Ubuntu/UOS 系</option>
                        <option value="rpm">rpm - CentOS/Fedora/RHEL 系</option>
                        <option value="AppImage, deb, rpm">完全打包 (包含以上三种)</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>

              <!-- macOS -->
              <div class="os-card">
                <div class="os-header">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M15 6v12a3 3 0 1 0 3-3H6a3 3 0 1 0 3 3V6a3 3 0 1 0-3 3h12a3 3 0 1 0-3-3"></path></svg>
                  <h3>macOS 平台</h3>
                </div>
                <div class="os-body grid two-col">
                  <div class="config-col">
                    <h4 class="col-title">设置参数区</h4>
                    <div class="field-row">
                      <label for="macCategory">应用程序分类</label>
                      <select id="macCategory">
                        <option value="" disabled>-- 请选择 macOS 分类 --</option>
                        <option value="public.app-category.utilities" selected>实用工具 (Utilities)(默认)</option>
                        <option value="public.app-category.developer-tools">开发者工具 (Developer Tools)</option>
                        <option value="public.app-category.productivity">效率工作 (Productivity)</option>
                        <option value="public.app-category.education">教育学习 (Education)</option>
                        <option value="public.app-category.games">娱乐游戏 (Games)</option>
                        <option value="public.app-category.business">商业软件 (Business)</option>
                        <option value="public.app-category.graphics-design">图像设计 (Graphics & Design)</option>
                        <option value="public.app-category.social-networking">社交沟通 (Social Networking)</option>
                      </select>
                    </div>
                  </div>
                  <div class="output-col">
                    <h4 class="col-title">产物输出区</h4>
                    <div class="field-row">
                      <label for="macTargets">最终产物形式</label>
                      <select id="macTargets">
                        <option value="" disabled>-- 请选择 macOS 产物 --</option>
                        <option value="dmg" selected>dmg - 苹果标准挂载包 (默认)</option>
                        <option value="zip">zip - 常规免安装压缩包</option>
                        <option value="dmg, zip">dmg + zip 同时产出</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </div>
<div id="tab-installer" class="tab-content">
            <div class="section-title">安装向导体验 (Windows NSIS)</div>
            <div class="grid four-col">
              <label><input id="nsisOneClick" type="checkbox" checked /> 一键快速静默安装</label>
              <label><input id="nsisPerMachine" type="checkbox" /> 针对该电脑所有用户</label>
              <label><input id="nsisAllowElevation" type="checkbox" checked /> 允许提示管理员提权</label>
              <label><input id="nsisAllowChangeDir" type="checkbox" /> 安装时可自选路径</label>
            </div>
            <div class="grid two-col">
              <div class="field-row"><label for="nsisShortcutName">程序菜单快捷方式名称</label><input id="nsisShortcutName" type="text" placeholder="留空则默认为应用产品名称" /></div>
              <div class="field-row">
                <label for="nsisCreateDesktopShortcut">系统桌面快捷方式创建行为</label>
                <select id="nsisCreateDesktopShortcut">
                  <option value="auto" selected>自动决定 (通常始终创建)</option>
                  <option value="always">必定强制在桌面创建快捷方式</option>
                  <option value="never">绝对不在桌面生成</option>
                </select>
              </div>
            </div>
            <div class="field-row checkbox-row">
              <label for="nsisDeleteAppData">应用卸载时，一同清除其用户数据存放夹</label>
              <input id="nsisDeleteAppData" type="checkbox" />
            </div>
          </div>

          <div id="tab-window" class="tab-content">
            <div class="section-title">打包后主窗口尺寸与特性约束</div>
            <div class="grid three-col">
              <div class="field-row"><label for="windowTitle">打开时窗口默认标题</label><input id="windowTitle" type="text" placeholder="例如：我的主页程序" /></div>
              <div class="field-row"><label for="windowWidth">初次打开宽度 (像素)</label><input id="windowWidth" type="text" placeholder="如：1280" /></div>
              <div class="field-row"><label for="windowHeight">初次打开高度 (像素)</label><input id="windowHeight" type="text" placeholder="如：800" /></div>
            </div>
            <div class="grid four-col">
              <label><input id="windowShowMenuBar" type="checkbox" checked /> 启用顶部原生的菜单栏</label>
              <label><input id="windowFrame" type="checkbox" checked /> 展现系统级标题栏/边框</label>
              <label><input id="windowResizable" type="checkbox" checked /> 准许最终用户缩放窗口</label>
              <label><input id="windowFullscreenable" type="checkbox" checked /> 允许利用系统功能全屏</label>
            </div>
            <div class="field-row checkbox-row">
              <label for="windowAlwaysOnTop">启动后使应用界面强制停留在最顶层</label>
              <input id="windowAlwaysOnTop" type="checkbox" />
            </div>
            <div class="section-title">程序呈现图标</div>
            <div class="grid three-col icon-grid">
              <div class="field-row">
                <label for="winIcon">Win 打包构建图标 (.ico)</label>
                <div class="input-with-btn"><input id="winIcon" type="text" placeholder="留空使用 Electron 默认" /><button id="pickWinIconBtn" type="button">浏览</button></div>
              </div>
              <div class="field-row">
                <label for="linuxIcon">Linux 企鹅图标 (.png)</label>
                <div class="input-with-btn"><input id="linuxIcon" type="text" placeholder="支持 png | 建议 512x512" /><button id="pickLinuxIconBtn" type="button">浏览</button></div>
              </div>
              <div class="field-row">
                <label for="macIcon">Mac Apple图标 (.icns)</label>
                <div class="input-with-btn"><input id="macIcon" type="text" placeholder="必需 .icns 格式大图片" /><button id="pickMacIconBtn" type="button">浏览</button></div>
              </div>
            </div>
          </div>

          <div id="tab-resources" class="tab-content">
            <div class="section-title">打包构建文件选择清单</div>
            <div class="grid two-col">
              <div class="field-row">
                <label for="filesGlobs">指明要封装进 Asar 的内容 (换行区分多条件)</label>
                <textarea id="filesGlobs" rows="6" placeholder="dist/**
main.js
package.json"></textarea>
              </div>
              <div class="field-row">
                <label for="extraResources">额外资源附件 (不被加密，随主程序一同发布复制)</label>
                <textarea id="extraResources" rows="6" placeholder="assets/**
config/**
readme.txt"></textarea>
              </div>
            </div>
            <div class="field-row">
              <label for="asarUnpack">需排除加密的零散文件模块 (每行一个，防底层 C++ 组件缺失异常)</label>
              <textarea id="asarUnpack" rows="4" placeholder="**/*.node
resources/native/**"></textarea>
            </div>
          </div>

          <div class="actions">
            <div id="actionFeedback" class="action-feedback" aria-live="polite"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg> 配置完成后，请点击“前往输出页面”再开始打包并查看日志</div>
          </div>
        </section>
      </div>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
