<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>构建输出 - html2exe</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background-glow"></div>
    <main class="layout">
      <aside class="sidebar panel">
        <div class="brand">
          <h1>html2exe</h1>
          <p>构建输出中心</p>
        </div>
        <nav class="nav-menu">
          <button id="goConfigPageBtn" class="nav-item active" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M15 18l-6-6 6-6"></path></svg>
            返回配置页面
          </button>
        </nav>
        <div class="sidebar-actions">
          <button id="buildBtn" type="button" class="primary btn-large"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path></svg> 立即开始打包</button>
          <button id="cancelBuildBtn" type="button" class="danger" disabled><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><circle cx="12" cy="12" r="10"></circle><rect width="6" height="6" x="9" y="9"></rect></svg> 强行终止</button>
          <button id="clearLogBtn" type="button" class="secondary">清空历史日志展示</button>
        </div>
      </aside>

      <div class="content-area single-panel">
        <section class="panel log-panel">
          <div class="actions compact-actions">
            <div id="actionFeedback" class="action-feedback" aria-live="polite">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>
              输出页面已就绪，可直接开始打包并查看实时日志
            </div>
          </div>
          <div class="progress-head">
            <h2><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="m7.5 4.27 9 5.15"></path><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path><path d="m3.3 7 8.7 5 8.7-5"></path><path d="M12 22V12"></path></svg> 当前构建进度流程</h2>
            <span id="overallStatus" class="overall-status idle">处于闲置状态中</span>
          </div>
          <div id="buildSteps" class="build-steps">
            <div class="step-item" data-step="prepare"><span class="dot"></span><span class="title">核对与预清理</span><span class="detail">尚未开始</span></div>
            <div class="step-item" data-step="temp-project"><span class="dot"></span><span class="title">预备临时打包环境</span><span class="detail">按需执行</span></div>
            <div class="step-item" data-step="install"><span class="dot"></span><span class="title">加载必要依赖库</span><span class="detail">进度未分配</span></div>
            <div class="step-item" data-step="package"><span class="dot"></span><span class="title">外壳应用与配置固化</span><span class="detail">计划中</span></div>
            <div class="step-item" data-step="artifact"><span class="dot"></span><span class="title">组装最终安全向导程序</span><span class="detail">稍后分配</span></div>
            <div class="step-item" data-step="complete"><span class="dot"></span><span class="title">生成输出构建报告</span><span class="detail">等待前面完成</span></div>
          </div>
          <div class="log-head">
            <h2><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" x2="8" y1="13" y2="13"></line><line x1="16" x2="8" y1="17" y2="17"></line><line x1="10" x2="8" y1="9" y2="9"></line></svg> 实时终端日志输出报告</h2>
          </div>
          <pre id="logOutput">打包器已就绪待命中，随时候命...</pre>
        </section>
      </div>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
